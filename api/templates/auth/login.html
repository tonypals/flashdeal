{% extends "base_dark.html" %}
{% block title %}Logga in — FlashDeal{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;padding:0 24px">
  <div style="text-align:center;margin-bottom:32px">
    <div class="hero-label">Kund-inloggning</div>
    <h2>Logga in</h2>
  </div>

  <form method="POST" style="background:var(--ink2);border:1px solid var(--border);border-radius:16px;padding:32px">
    <div class="form-group">
      <label class="form-label" for="email">E-postadress</label>
      <input type="email" name="email" id="email" class="form-control"
             placeholder="din@email.se" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Lösenord</label>
      <input type="password" name="password" id="password" class="form-control"
             placeholder="Ditt lösenord" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;font-size:15px;padding:13px">
      Logga in →
    </button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted2)">
      Inget konto? <a href="{{ url_for('auth.register') }}">Registrera dig</a>
    </p>
  </form>

  <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--soft)">
    Butik? <a href="{{ url_for('auth.store_login') }}" style="color:var(--muted)">Logga in som butik →</a>
  </div>
</div>
{% endblock %}
