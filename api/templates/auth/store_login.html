{% extends "base_light.html" %}
{% block title %}Logga in — FlashDeal Butikspanel{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;padding:0 24px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px">Butikspanel</div>
    <h2 style="font-size:26px;font-weight:800;color:var(--text)">Flash<span style="color:var(--accent)">Deal</span></h2>
    <p style="font-size:14px;color:var(--muted);margin-top:6px">Logga in för att hantera dina erbjudanden</p>
  </div>

  <form method="POST" style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:var(--shadow)">
    <div class="form-group">
      <label class="form-label" for="email">E-postadress</label>
      <input type="email" name="email" id="email" class="form-control"
             placeholder="butik@exempel.se" required autocomplete="email">
    </div>
    <div class="form-group" style="margin-bottom:24px">
      <label class="form-label" for="password">Lösenord</label>
      <input type="password" name="password" id="password" class="form-control"
             placeholder="Ditt lösenord" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;font-size:15px;padding:13px">
      Logga in →
    </button>
  </form>

  <div style="text-align:center;margin-top:20px">
    <a href="{{ url_for('auth.store_register') }}" style="font-size:13px;color:var(--muted)">
      Ny butik? Registrera er här →
    </a>
  </div>
  <div style="text-align:center;margin-top:8px">
    <a href="{{ url_for('public.index') }}" style="font-size:12px;color:var(--border2)">
      ← Till kundvyn
    </a>
  </div>
</div>
{% endblock %}
